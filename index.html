<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- KRİTİK: Sahibinden.com hotlink (resim engelleme) korumasını aşmak için -->
    <meta name="referrer" content="no-referrer">
    <title>İkinci El Ekran Kartı Takipçisi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Özel renk ayarları
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f1117',
                        cardBg: '#1f222e'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f1117;
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* Özel Glow Efekti */
        .hover-glow:hover {
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Header Alanı -->
    <header class="max-w-7xl mx-auto mb-8 border-b border-gray-800 pb-6">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">
                    İkinci El Ekran Kartı Takipçisi
                </h1>
                <p class="text-sm text-gray-400 mt-1 flex items-center gap-2">
                    <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    Sadece "Param Güvende" İlanları
                </p>
            </div>
            <div class="bg-cardBg px-4 py-2 rounded-lg border border-gray-800 shadow-sm">
                <span class="text-xs text-gray-400 block">Son Güncelleme:</span>
                <span id="last-update" class="text-sm font-medium text-white">Yükleniyor...</span>
            </div>
        </div>
    </header>

    <!-- İçerik Alanı (Durum Mesajları ve Grid) -->
    <main class="max-w-7xl mx-auto">
        <!-- Durum Mesajı Konteyneri -->
        <div id="status-container" class="w-full text-center py-12 hidden">
            <div class="inline-block bg-cardBg border border-gray-700 rounded-xl p-8 shadow-lg">
                <svg id="status-icon" class="w-12 h-12 mx-auto mb-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <h2 id="status-title" class="text-xl font-bold text-gray-200 mb-2">Yükleniyor...</h2>
                <p id="status-message" class="text-gray-400">Veriler sunucudan çekiliyor, lütfen bekleyin.</p>
            </div>
        </div>

        <!-- İlan Grid Alanı -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Kartlar JS ile buraya eklenecek -->
        </div>
    </main>

    <!-- JavaScript Mantığı -->
    <script>
        const gridElement = document.getElementById('product-grid');
        const statusContainer = document.getElementById('status-container');
        const statusTitle = document.getElementById('status-title');
        const statusMessage = document.getElementById('status-message');
        const statusIcon = document.getElementById('status-icon');
        const lastUpdateElement = document.getElementById('last-update');

        function showStatus(title, message, isError = false) {
            gridElement.style.display = 'none';
            statusContainer.classList.remove('hidden');
            statusTitle.textContent = title;
            statusMessage.textContent = message;
            
            if (isError) {
                statusIcon.classList.replace('text-gray-500', 'text-red-500');
            } else {
                statusIcon.classList.replace('text-red-500', 'text-gray-500');
            }
        }

        // Cache tutmaması için zaman damgası eklendi ve cache: 'no-store' kullanıldı
        fetch('ilanlar.json?v=' + Date.now(), { cache: 'no-store' })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Veri dosyasına ulaşılamadı (HTTP ' + response.status + ')');
                }
                return response.json();
            })
            .then(data => {
                if (!data || data.length === 0) {
                    showStatus('İlan Bulunamadı', 'Şu an için kriterlere uygun ilan verisi bulunmuyor.');
                    lastUpdateElement.textContent = "Veri Yok";
                    return;
                }

                // En güncel tarihi al (İlk sıradaki ilanın saati)
                const latestDate = new Date(data[0].scraped_at);
                lastUpdateElement.textContent = latestDate.toLocaleString('tr-TR', { 
                    day: '2-digit', month: 'long', year: 'numeric', 
                    hour: '2-digit', minute: '2-digit' 
                });

                let htmlContent = '';

                data.forEach(item => {
                    // Güvenli resim URL'si kontrolü
                    const imgUrl = item.image ? item.image : '';
                    
                    htmlContent += `
                        <a href="${item.link}" target="_blank" rel="noopener noreferrer" 
                           class="bg-cardBg rounded-xl border border-gray-800 overflow-hidden transition-all duration-300 transform hover:-translate-y-2 hover-glow flex flex-col h-full group">
                            
                            <!-- Resim Alanı -->
                            <div class="relative w-full h-48 bg-gray-900 overflow-hidden">
                                <img src="${imgUrl}" 
                                     alt="Ekran Kartı Resmi" 
                                     onerror="this.src='https://placehold.co/600x400/1f222e/ffffff?text=Gorsel+Yok'; this.onerror=null;"
                                     class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" />
                                
                                <div class="absolute top-2 right-2 bg-green-500/20 text-green-400 border border-green-500/50 text-xs px-2 py-1 rounded backdrop-blur-sm font-semibold flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                    Güvende
                                </div>
                            </div>

                            <!-- Bilgi Alanı -->
                            <div class="p-4 flex flex-col flex-grow">
                                <h3 class="text-sm text-gray-200 font-medium line-clamp-2 mb-3 group-hover:text-green-400 transition-colors">
                                    ${item.title}
                                </h3>
                                
                                <div class="mt-auto flex justify-between items-end">
                                    <div class="text-lg font-bold text-green-400 tracking-wide">
                                        ${item.price}
                                    </div>
                                    <div class="text-xs text-gray-500 bg-gray-800 px-2 py-1 rounded">
                                        İlan ID: ${item.id}
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                });

                gridElement.innerHTML = htmlContent;
                gridElement.style.display = 'grid'; // Grid'i görünür yap
                statusContainer.classList.add('hidden'); // Yükleniyor kısmını gizle
            })
            .catch(error => {
                console.error('Veri çekme hatası:', error);
                showStatus('Bağlantı Hatası', 'Veriler yüklenirken bir sorun oluştu. Github Actions henüz çalışmamış veya ilanlar.json oluşturulmamış olabilir.', true);
                lastUpdateElement.textContent = "Hata";
            });
    </script>
</body>
</html>
